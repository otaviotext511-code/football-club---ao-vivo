<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Football Live</title>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;700&family=IBM+Plex+Sans:wght@300;400;600&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#f5f5f3;--white:#fff;--black:#111;--mid:#555;--muted:#999;
  --border:#e2e2de;--live:#cc2222;--live-bg:rgba(204,34,34,.04);
  --warn:#b07020;--green:#1a7a3a;
  --mono:'IBM Plex Mono',monospace;--sans:'IBM Plex Sans',sans-serif;
}
body{background:var(--bg);color:var(--black);font-family:var(--sans);min-height:100vh}
.app{max-width:960px;margin:0 auto;padding:0 20px 80px}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:20px 0 16px;border-bottom:1px solid var(--black);margin-bottom:32px;flex-wrap:wrap;gap:10px}
.logo{font-family:var(--mono);font-size:12px;font-weight:700;letter-spacing:3px;text-transform:uppercase;display:flex;align-items:center;gap:10px}
.live-dot{width:7px;height:7px;background:var(--live);border-radius:50%;animation:pulse 1.4s infinite}
@keyframes pulse{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.7)}}
.header-right{display:flex;align-items:center;gap:20px}
.clock{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:1px}

/* STATUS BAR */
.status-bar{
  font-family:var(--mono);font-size:10px;letter-spacing:1px;
  padding:8px 14px;margin-bottom:20px;
  display:flex;align-items:center;gap:10px;
  border:1px solid var(--border);background:var(--white);
}
.status-bar.ok      {border-color:var(--green);color:var(--green)}
.status-bar.waiting {border-color:var(--warn);color:var(--warn)}
.status-bar.no_games{border-color:var(--muted);color:var(--muted)}
.status-bar.error   {border-color:var(--live);color:var(--live)}
.status-bar.mock    {border-color:#7a5c9a;color:#7a5c9a}
.status-bar.polling {border-color:var(--muted);color:var(--muted)}
.sb-dot{width:6px;height:6px;border-radius:50%;background:currentColor;flex-shrink:0}
.sb-dot.blink{animation:pulse 1s infinite}

/* SEARCH */
.search-wrap{position:relative;margin-bottom:12px}
.search-wrap input{
  width:100%;background:var(--white);border:1px solid var(--border);
  padding:11px 16px 11px 38px;font-family:var(--mono);font-size:12px;
  color:var(--black);outline:none;transition:border-color .15s;
}
.search-wrap input:focus{border-color:var(--black)}
.search-wrap input::placeholder{color:var(--muted)}
.search-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);font-size:14px;color:var(--muted);pointer-events:none}
.chips{display:flex;flex-wrap:wrap;gap:4px;margin-bottom:24px}
.chip{font-family:var(--mono);font-size:9px;letter-spacing:1px;border:1px solid var(--border);padding:3px 8px;color:var(--muted);cursor:pointer;background:var(--white);user-select:none;transition:all .1s}
.chip:hover,.chip.active{border-color:var(--black);color:var(--black)}

/* SECTION LABEL */
.slabel{font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--muted);margin-bottom:12px}

/* EMPTY STATES */
.empty-state{
  background:var(--white);border:1px solid var(--border);
  padding:48px 32px;text-align:center;margin-bottom:28px;
}
.empty-state .es-icon{font-size:32px;margin-bottom:16px;opacity:.4}
.empty-state .es-title{font-family:var(--mono);font-size:13px;font-weight:700;letter-spacing:1px;margin-bottom:8px}
.empty-state .es-sub{font-family:var(--mono);font-size:11px;color:var(--muted);letter-spacing:.5px;line-height:1.8}
.empty-state .es-next{margin-top:16px;font-family:var(--mono);font-size:10px;color:var(--warn)}

/* FEATURED */
.featured{background:var(--white);border:1px solid var(--black);padding:28px 32px;margin-bottom:28px;position:relative;cursor:pointer;transition:box-shadow .15s}
.featured:hover{box-shadow:3px 3px 0 var(--black)}
.feat-badge{position:absolute;top:-1px;left:-1px;font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;background:var(--black);color:var(--white);padding:3px 10px}
.feat-body{display:grid;grid-template-columns:1fr auto 1fr;align-items:center;gap:20px;margin-top:14px}
.feat-team{display:flex;align-items:center;gap:14px}
.feat-team.away{flex-direction:row-reverse;text-align:right}
.feat-team .tname{font-family:var(--mono);font-size:15px;font-weight:700;line-height:1.3}
.logo-img{object-fit:contain;flex-shrink:0;display:block}
.logo-img.lg{width:52px;height:52px}
.logo-img.sm{width:26px;height:26px}
.logo-ph{flex-shrink:0;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;font-family:var(--mono);font-weight:700;color:var(--mid)}
.logo-ph.lg{width:52px;height:52px;font-size:13px}
.logo-ph.sm{width:26px;height:26px;font-size:8px}
.score-center{text-align:center}
.score-big{font-family:var(--mono);font-size:52px;font-weight:700;letter-spacing:8px;line-height:1}
.score-status{margin-top:6px;font-family:var(--mono);font-size:10px;letter-spacing:2px}
.feat-foot{display:flex;justify-content:space-between;align-items:flex-start;flex-wrap:wrap;gap:10px;margin-top:18px;padding-top:14px;border-top:1px solid var(--border)}
.events{display:flex;flex-wrap:wrap;gap:5px}
.ev{font-family:var(--mono);font-size:9px;border:1px solid var(--border);padding:2px 7px}
.ev.goal{border-color:var(--green);color:var(--green)}
.ev.yellow{border-color:#b09000;color:#b09000}
.ev.red{border-color:var(--live);color:var(--live)}
.feat-tags{display:flex;flex-wrap:wrap;gap:4px}

/* LIST */
.match-list{display:flex;flex-direction:column;gap:1px}
.mrow{background:var(--white);border:1px solid var(--border);padding:12px 18px;display:grid;grid-template-columns:1fr 70px 1fr 64px;align-items:center;gap:10px;cursor:pointer;transition:border-color .12s;position:relative}
.mrow:hover{border-color:var(--black)}
.mrow.is-live{background:var(--live-bg)}
.mr-team{display:flex;align-items:center;gap:8px;font-family:var(--mono);font-size:12px;font-weight:500;overflow:hidden}
.mr-team.away{flex-direction:row-reverse;justify-content:flex-start}
.mr-team span{white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.mr-score{font-family:var(--mono);font-size:15px;font-weight:700;letter-spacing:2px;text-align:center}
.mr-st{font-family:var(--mono);font-size:9px;letter-spacing:1px;text-align:right;white-space:nowrap}

/* STATUS COLORS */
.c-live{color:var(--live)}.c-ht{color:var(--warn)}.c-soon{color:var(--warn)}
.c-ft{color:var(--muted)}.c-susp{color:var(--live)}.c-canc{color:var(--live);text-decoration:line-through}

/* NO RESULTS */
.no-results{display:none;text-align:center;padding:48px 20px;font-family:var(--mono);font-size:12px;color:var(--muted);letter-spacing:1px}

/* FILTER BAR */
.filter-bar{display:flex;gap:1px;margin-bottom:20px}
.fb-btn{
  flex:1;padding:9px 4px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;
  text-transform:uppercase;background:var(--white);border:1px solid var(--border);
  color:var(--muted);cursor:pointer;transition:all .12s;text-align:center;
}
.fb-btn:hover{border-color:var(--black);color:var(--black)}
.fb-btn.active{background:var(--black);border-color:var(--black);color:var(--white)}
.fb-btn.active.live{background:var(--live);border-color:var(--live)}
.fb-btn.active.ht{background:var(--warn);border-color:var(--warn)}
.fb-btn.active.agenda{background:var(--mid);border-color:var(--mid)}

/* LOAD MORE */
.load-more-btn{
  width:100%;margin-top:1px;padding:12px;
  font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;
  background:var(--white);border:1px solid var(--border);color:var(--muted);
  cursor:pointer;transition:all .12s;
}
.load-more-btn:hover{border-color:var(--black);color:var(--black)}
.load-more-chips{
  font-family:var(--mono);font-size:9px;letter-spacing:1px;
  background:none;border:1px solid var(--border);padding:3px 8px;
  color:var(--muted);cursor:pointer;transition:all .1s;
}
.load-more-chips:hover{border-color:var(--black);color:var(--black)}

/* FOOTER */
footer{margin-top:48px;padding-top:14px;border-top:1px solid var(--border);display:flex;justify-content:space-between;font-family:var(--mono);font-size:9px;color:var(--muted);letter-spacing:1px;flex-wrap:wrap;gap:6px}

@media(max-width:580px){
  .feat-body{grid-template-columns:1fr;text-align:center}
  .feat-team,.feat-team.away{flex-direction:column;align-items:center}
  .mrow{grid-template-columns:1fr 60px 1fr}.mr-st{display:none}
}
</style>
</head>
<body>
<div class="app">
  <header>
    <div class="logo"><div class="live-dot"></div>Football Live</div>
    <div class="header-right"><div class="clock" id="clock">--:--:--</div></div>
  </header>

  <div class="status-bar polling" id="status-bar">
    <div class="sb-dot blink"></div>
    <span id="status-text">conectando...</span>
  </div>

  <div class="search-wrap">
    <div class="search-icon">›</div>
    <input id="search" type="text" placeholder="buscar time ou #tag..." autocomplete="off" spellcheck="false">
  </div>
  <div class="chips" id="chips"></div>

  <div class="filter-bar">
    <button class="fb-btn live"   data-f="live"   onclick="setFilter('live')"  >⚽ ao vivo</button>
    <button class="fb-btn ht"     data-f="ht"     onclick="setFilter('ht')"    >⏸ intervalo</button>
    <button class="fb-btn agenda" data-f="agenda" onclick="setFilter('agenda')">📅 em agenda</button>
  </div>
  <div class="slabel" id="lbl-feat" style="display:none">destaque</div>
  <div id="featured"></div>

  <div class="slabel" id="lbl-list" style="display:none">em andamento &amp; programados</div>
  <div class="match-list" id="match-list"></div>
  <div class="no-results" id="no-results">nenhum resultado para "<span id="no-q"></span>"</div>

  <footer>
    <span>Football Live v0.2</span>
    <span id="footer-status">aguardando dados...</span>
  </footer>
</div>

<script>
const POLL_MS = 30 * 1000; // frontend re-busca do servidor a cada 30s

// ── ESTADO ─────────────────────────────────────────────────────────────
let pinnedId = null;
let query    = '';
let matches  = [];
let badges   = {};
let appStatus = 'polling';

const PAGE = 50;
let visibleMatches = PAGE;
let visibleChips   = PAGE;
let statusFilter   = '';

const FILTER_STATUSES = {
  live:   ['1h','2h','et','pen'],
  ht:     ['ht'],
  agenda: ['scheduled','soon'],
};

function setFilter(val) {
  statusFilter = statusFilter === val ? '' : val;
  visibleMatches = PAGE;
  document.querySelectorAll('.fb-btn').forEach(b =>
    b.classList.toggle('active', b.dataset.f === statusFilter)
  );
  render();
}

// ── STATUS MESSAGES ─────────────────────────────────────────────────────
const STATUS_MSG = {
  waiting:  (s) => `sem jogos agora — próximo slot em ${fmtMin(s.nextPollIn)}`,
  no_games: ()  => 'nenhum jogo encontrado nesse horário',
  error:    ()  => 'erro ao buscar dados — tentando novamente...',
  mock:     ()  => 'modo demonstração — dados fictícios',
  ok:       (s) => `${s.count} partidas — atualizado às ${fmtTime(s.lastPoll)}`,
  polling:  ()  => 'atualizando...',
};
function fmtMin(sec) {
  if (!sec) return '--';
  const m = Math.floor(sec / 60);
  const h = Math.floor(m / 60);
  return h > 0 ? `${h}h${String(m%60).padStart(2,'0')}` : `${m}min`;
}
function fmtTime(iso) {
  if (!iso) return '--';
  return new Date(iso).toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit'});
}

// ── FETCH MATCHES ────────────────────────────────────────────────────────
async function fetchMatches() {
  try {
    const r = await fetch('/api/matches');
    const d = await r.json();
    appStatus = d.status || 'ok';
    updateStatusBar(d);
    if (d.matches?.length) {
      matches = d.matches;
      visibleMatches = PAGE;
      visibleChips   = PAGE;
      if (!pinnedId) pinnedId = [...matches].sort((a,b)=>b.priority-a.priority)[0]?.id;
      buildChips();
      await loadBadges();
    } else {
      matches = [];
    }
    render();
  } catch(e) {
    appStatus = 'error';
    updateStatusBar({ status:'error' });
  }
}

function updateStatusBar(d) {
  const bar  = document.getElementById('status-bar');
  const text = document.getElementById('status-text');
  const st   = d.status || 'polling';
  bar.className = `status-bar ${st}`;
  const dot  = bar.querySelector('.sb-dot');
  dot.className = `sb-dot${['ok','mock'].includes(st) ? '' : ' blink'}`;
  text.textContent = (STATUS_MSG[st] ?? STATUS_MSG.polling)(d);
  document.getElementById('footer-status').textContent =
    d.mockMode ? 'modo mock ativo' : `próximo poll: ${fmtMin(d.nextPollIn)}`;
}

// ── BADGES ──────────────────────────────────────────────────────────────
async function loadBadges() {
  // usa logos diretas da API se disponível, senão tenta Wikipedia
  const direct = {};
  const toFetch = [];
  matches.forEach(m => {
    if (m.homeLogo) direct[m.home] = m.homeLogo;
    else if (!badges[m.home]) toFetch.push(m.home);
    if (m.awayLogo) direct[m.away] = m.awayLogo;
    else if (!badges[m.away]) toFetch.push(m.away);
  });
  Object.assign(badges, direct);
  if (!toFetch.length) return;
  try {
    const r = await fetch('/api/badges', {
      method:'POST', headers:{'Content-Type':'application/json'},
      body: JSON.stringify([...new Set(toFetch)])
    });
    const d = await r.json();
    Object.assign(badges, d);
  } catch {}
}

function ini(name) {
  return name.split(/\s+/).map(w=>w[0]).join('').slice(0,3).toUpperCase();
}
function mkLogo(name, size) {
  const url = badges[name];
  if (url) {
    const img = document.createElement('img');
    img.className = `logo-img ${size}`;
    img.src = url; img.alt = name;
    img.onerror = () => img.replaceWith(mkPh(name, size));
    return img;
  }
  return mkPh(name, size);
}
function mkPh(name, size) {
  const d = document.createElement('div');
  d.className = `logo-ph ${size}`;
  d.textContent = ini(name);
  return d;
}

// ── STATUS LABELS ────────────────────────────────────────────────────────
const ST_LABEL = {
  scheduled:m=>(m.scheduledTime??'--:--'),
  soon:     ()=>'em breve',
  '1h':     m=>`${m.minute}'`,
  ht:       ()=>'intervalo',
  '2h':     m=>`${m.minute}'`,
  et:       m=>`${m.minute}'`,
  pen:      ()=>'pênaltis',
  ft:       ()=>'encerrado',
  susp:     ()=>'suspenso',
  canc:     ()=>'cancelado',
};
const ST_CLASS = {
  '1h':'c-live','2h':'c-live','et':'c-live','pen':'c-live',
  ht:'c-ht',soon:'c-soon',scheduled:'c-ft',ft:'c-ft',susp:'c-susp',canc:'c-canc',
};
function stLabel(m) {
  const fn = ST_LABEL[m.status]; return fn ? fn(m) : m.status;
}
function isLive(m) { return ['1h','2h','et','pen'].includes(m.status); }

// ── RENDER ────────────────────────────────────────────────────────────────
function render() {
  const q = query.toLowerCase().trim();
  let filtered = q
    ? matches.filter(m =>
        m.home.toLowerCase().includes(q) ||
        m.away.toLowerCase().includes(q) ||
        (m.tags||[]).some(t=>t.toLowerCase().includes(q)) ||
        (m.competition||'').toLowerCase().includes(q))
    : matches;

  // aplica filtro de status se ativo
  if (statusFilter && FILTER_STATUSES[statusFilter]) {
    const allowed = FILTER_STATUSES[statusFilter];
    filtered = filtered.filter(m => allowed.includes(m.status));
  }

  let feat = filtered.find(m=>m.id===pinnedId)
          ?? [...filtered].sort((a,b)=>b.priority-a.priority)[0];
  const rest = filtered.filter(m=>m!==feat);

  const noR      = document.getElementById('no-results');
  const featEl   = document.getElementById('featured');
  const listEl   = document.getElementById('match-list');
  const lblFeat  = document.getElementById('lbl-feat');
  const lblList  = document.getElementById('lbl-list');

  // Sem resultados de busca
  if (q && !filtered.length) {
    noR.style.display = 'block';
    document.getElementById('no-q').textContent = q;
    featEl.innerHTML = ''; lblFeat.style.display = 'none';
    listEl.innerHTML = ''; lblList.style.display = 'none';
    return;
  }
  noR.style.display = 'none';

  // Sem jogos nenhum
  if (!matches.length) {
    lblFeat.style.display = 'none';
    lblList.style.display = 'none';
    featEl.innerHTML = '';
    listEl.innerHTML = '';
    renderEmptyState(featEl);
    return;
  }

  lblFeat.style.display = feat ? '' : 'none';
  lblList.style.display = rest.length ? '' : 'none';
  renderFeat(feat, featEl);
  renderList(rest, listEl);
}

function renderEmptyState(el) {
  const st = appStatus;
  const configs = {
    waiting:  { icon:'🕐', title:'sem jogos no momento', sub:'o próximo slot começa em breve\no poller vai acordar automaticamente' },
    no_games: { icon:'📭', title:'nenhum jogo encontrado', sub:'não há partidas cadastradas nesse horário' },
    error:    { icon:'⚠', title:'não foi possível buscar os dados', sub:'verifique a conexão e a chave da API\no sistema tentará novamente em breve' },
    mock:     { icon:'⚽', title:'modo demonstração ativo', sub:'configure API_KEY no .env para dados reais' },
  };
  const cfg = configs[st] ?? { icon:'📭', title:'sem jogos agora', sub:'' };
  el.innerHTML = `
    <div class="empty-state">
      <div class="es-icon">${cfg.icon}</div>
      <div class="es-title">${cfg.title}</div>
      <div class="es-sub">${cfg.sub.replace(/\n/g,'<br>')}</div>
    </div>
  `;
}

function renderFeat(m, el) {
  el.innerHTML = '';
  if (!m) return;
  const card = document.createElement('div');
  card.className = 'featured';

  const b = document.createElement('div');
  b.className = 'feat-badge';
  b.textContent = m.competition + (m.round ? ' · ' + m.round : '');
  card.appendChild(b);

  const body = document.createElement('div');
  body.className = 'feat-body';

  const home = document.createElement('div');
  home.className = 'feat-team home';
  home.appendChild(mkLogo(m.home,'lg'));
  const hn = document.createElement('div'); hn.className='tname'; hn.textContent=m.home;
  home.appendChild(hn);

  const sc = document.createElement('div');
  sc.className = 'score-center';
  const stCls = ST_CLASS[m.status]||'c-ft';
  const scoreStr = m.status==='scheduled' ? (m.scheduledTime??'--:--') : `${m.sh??0} · ${m.sa??0}`;
  sc.innerHTML = `<div class="score-big">${scoreStr}</div><div class="score-status ${stCls}">${stLabel(m)}</div>`;

  const away = document.createElement('div');
  away.className = 'feat-team away';
  const an = document.createElement('div'); an.className='tname'; an.textContent=m.away;
  away.appendChild(an);
  away.appendChild(mkLogo(m.away,'lg'));

  body.append(home, sc, away);
  card.appendChild(body);

  if ((m.events||[]).length || (m.tags||[]).length) {
    const foot = document.createElement('div');
    foot.className = 'feat-foot';
    const evs = document.createElement('div'); evs.className='events';
    (m.events||[]).forEach(e => {
      const p = document.createElement('span');
      p.className=`ev ${e.t}`;
      p.textContent=`${e.m}' ${e.player}`;
      evs.appendChild(p);
    });
    const tags = document.createElement('div'); tags.className='feat-tags';
    (m.tags||[]).forEach(t => {
      const c = document.createElement('span');
      c.className='chip'+(query===t?' active':''); c.textContent=t; c.dataset.tag=t;
      c.onclick = ev => { ev.stopPropagation(); setQuery(c.classList.contains('active')?'':t); };
      tags.appendChild(c);
    });
    foot.append(evs, tags);
    card.appendChild(foot);
  }
  el.appendChild(card);
}

function renderList(matchArr, el) {
  el.innerHTML = '';
  const sorted = [...matchArr].sort((a,b) => {
    const al=isLive(a)?1:0, bl=isLive(b)?1:0;
    return al!==bl ? bl-al : b.priority-a.priority;
  });

  const page = sorted.slice(0, visibleMatches);
  page.forEach(m => {
    const row = document.createElement('div');
    row.className = 'mrow'+(isLive(m)?' is-live':'');
    row.onclick = () => { pinnedId=m.id; render(); };
    const stCls = ST_CLASS[m.status]||'c-ft';

    const home = document.createElement('div'); home.className='mr-team home';
    home.appendChild(mkLogo(m.home,'sm'));
    const hs=document.createElement('span'); hs.textContent=m.home; home.appendChild(hs);

    const sc = document.createElement('div');
    sc.className=`mr-score ${stCls}`;
    sc.textContent = m.status==='scheduled' ? (m.scheduledTime??'--:--') : `${m.sh??0}·${m.sa??0}`;

    const away = document.createElement('div'); away.className='mr-team away';
    const as_=document.createElement('span'); as_.textContent=m.away; away.appendChild(as_);
    away.appendChild(mkLogo(m.away,'sm'));

    const st = document.createElement('div');
    st.className=`mr-st ${stCls}`; st.textContent=stLabel(m);

    row.append(home, sc, away, st);
    el.appendChild(row);
  });

  if (sorted.length > visibleMatches) {
    const remaining = sorted.length - visibleMatches;
    const btn = document.createElement('button');
    btn.className = 'load-more-btn';
    btn.textContent = `carregar mais ${Math.min(PAGE, remaining)} partidas (${remaining} restantes)`;
    btn.onclick = () => { visibleMatches += PAGE; renderList(matchArr, el); };
    el.appendChild(btn);
  }
}

// ── CHIPS ────────────────────────────────────────────────────────────────
function buildChips() {
  const tags = [...new Set(matches.flatMap(m=>m.tags||[]))];
  const wrap = document.getElementById('chips');
  wrap.innerHTML = '';

  const toShow = tags.slice(0, visibleChips);
  toShow.forEach(t => {
    const c=document.createElement('span'); c.className='chip'; c.textContent=t; c.dataset.tag=t;
    c.onclick=()=>setQuery(c.classList.contains('active')?'':t);
    wrap.appendChild(c);
  });

  if (tags.length > visibleChips) {
    const btn = document.createElement('button');
    btn.className = 'load-more-chips';
    btn.textContent = `+${tags.length - visibleChips} tags`;
    btn.onclick = () => { visibleChips += PAGE; buildChips(); };
    wrap.appendChild(btn);
  }

  // re-aplica active
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.tag===query));
}

function setQuery(val) {
  query = val;
  visibleMatches = PAGE;
  visibleChips   = PAGE;
  document.getElementById('search').value = val;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.tag===val));
  buildChips();
  render();
}

// ── CLOCK ─────────────────────────────────────────────────────────────────
function tick() {
  document.getElementById('clock').textContent =
    new Date().toLocaleTimeString('pt-BR',{hour:'2-digit',minute:'2-digit',second:'2-digit'});
}
setInterval(tick,1000); tick();

document.getElementById('search').addEventListener('input', e => {
  query = e.target.value;
  visibleMatches = PAGE;
  visibleChips   = PAGE;
  document.querySelectorAll('.chip').forEach(c=>c.classList.toggle('active',c.dataset.tag===query));
  buildChips();
  render();
});

// ── INIT + POLL ────────────────────────────────────────────────────────────
fetchMatches();
setInterval(fetchMatches, POLL_MS);
</script>
</body>
</html>
